spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: eureka-route
              uri: http://localhost:8761
              predicates:
                - Path=/eureka/**
              filters:
                - StripPrefix=1

            - id: config-route
              uri: http://localhost:8888
              predicates:
                - Path=/config/**
              filters:
                - StripPrefix=1

            - id: admin-route
              uri: http://localhost:9000
              predicates:
                - Path=/admin/**
              filters:
                - StripPrefix=1

management:
  endpoints:
    web:
      exposure:
        include: "*"